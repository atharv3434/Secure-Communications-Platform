# Server
server.port=8080
spring.application.name=secure-comms

# H2 Database
spring.datasource.url=jdbc:h2:mem:securecomms;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

# JWT
app.jwt.secret=SecureComms-JWT-Secret-Key-Must-Be-At-Least-256-Bits-Long-For-HS256
app.jwt.expiration-ms=86400000

# Blockchain
app.blockchain.difficulty=3
app.blockchain.genesis-data=SecureComms Genesis Block v1.0

# Logging
logging.level.com.securecomms=DEBUG
logging.level.org.springframework.security=WARN

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html